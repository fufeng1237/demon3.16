base_local_planner: dwa_local_planner/DWAPlannerROS
base_global_planner: navfn/NavfnROS
controller_frequency: 5.0
# A local segment is planned once at Portal entry. DWA follows that reference
# path; it is not repeatedly reset/re-rendered during the demonstration.
planner_frequency: 0.0
recovery_behavior_enabled: false
shutdown_costmaps: false

global_costmap:
  global_frame: map
  robot_base_frame: base_link
  update_frequency: 5.0
  publish_frequency: 2.0
  static_map: true
  track_unknown_space: false
  # The kinematic simulator runs in Python alongside RViz.  Permit a modest
  # TF delay so move_base does not repeatedly discard otherwise valid odometry.
  transform_tolerance: 3.0
  footprint: [[-1.2,-0.7], [1.2,-0.7], [1.2,0.7], [-1.2,0.7]]
  plugins:
    - {name: static_layer, type: "costmap_2d::StaticLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
  static_layer:
    map_topic: /map
    subscribe_to_updates: true
  inflation_layer:
    inflation_radius: 1.5

local_costmap:
  global_frame: map
  robot_base_frame: base_link
  update_frequency: 10.0
  publish_frequency: 5.0
  static_map: true
  track_unknown_space: false
  rolling_window: true
  width: 20.0
  height: 20.0
  resolution: 0.5
  transform_tolerance: 3.0
  footprint: [[-1.2,-0.7], [1.2,-0.7], [1.2,0.7], [-1.2,0.7]]
  plugins:
    - {name: static_layer, type: "costmap_2d::StaticLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
  static_layer:
    map_topic: /map
    subscribe_to_updates: true
  inflation_layer:
    inflation_radius: 1.5

DWAPlannerROS:
  holonomic_robot: false
  max_vel_x: 3.0
  min_vel_x: 0.0
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_theta: 1.0
  min_vel_theta: -1.0
  acc_lim_x: 1.0
  acc_lim_theta: 1.0
  xy_goal_tolerance: 0.7
  yaw_goal_tolerance: 0.5
  sim_time: 2.0
  vx_samples: 12
  vtheta_samples: 20
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.05
  forward_point_distance: 0.5
  stop_time_buffer: 0.2
