AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA bgImg.onload=()=>{resize();draw();};

function resize(){
    const s=Math.min(window.innerWidth/WPX,window.innerHeight/HPX);
    c.width=WPX*s;c.height=HPX*s;
    draw();
}
window.addEventListener('resize',resize);

function imgToCanvas(px,py){
    const s=c.width/WPX;
    return{x:px*s,y:py*s};
}
function canvasToImg(sx,sy){
    const s=c.width/WPX;
    return{x:Math.round(sx/s),y:Math.round(sy/s)};
}

c.addEventListener('mousemove',e=>{
    const r=c.getBoundingClientRect();
    const p=canvasToImg(e.clientX-r.left,e.clientY-r.top);
    const wy=HPX-p.y; // flip for world
    document.getElementById('cursor').textContent=`px:${p.x} py:${p.y}  world:(${(p.x*PS).toFixed(0)},${(wy*PS).toFixed(0)})m`;
});

c.addEventListener('click',e=>{
    const r=c.getBoundingClientRect();
    const p=canvasToImg(e.clientX-r.left,e.clientY-r.top);
    if(p.x<0||p.x>=WPX||p.y<0||p.y>=HPX)return;
    if(!cur){
        cur=p;
        const wy=HPX-p.y;
        document.getElementById('status').innerHTML=`<span class="pu">Pickup</span> px=(${p.x},${p.y}) world=(${(p.x*PS).toFixed(0)},${(wy*PS).toFixed(0)})m → click <span class="de">Delivery</span>`;
    }else{
        tasks.push({px:cur.x,py:cur.y,dx:p.x,dy:p.y});
        cur=null;
        document.getElementById('status').innerHTML=`Task ${tasks.length-1} done (${tasks.length} total)`;
        updList();
    }
    draw();
});
c.addEventListener('contextmenu',e=>{e.preventDefault();if(cur){cur=null;draw();}});

function undo(){if(tasks.length){tasks.pop();updList();draw();}}
function clearAll(){tasks=[];cur=null;updList();draw();}
function save(){
    let t='# Tasks — C++ pixel coords (original image, y=0 at top)\n';
    t+='# Format: Task ID: pickup=(px,py) delivery=(px,py)\n\n';
    tasks.forEach((tk,i)=>{
        const pwy=HPX-tk.py, dwy=HPX-tk.dy;
        t+=`Task ${i}: pickup=(${tk.px},${tk.py}) delivery=(${tk.dx},${tk.dy})\n`;
    });
    const b=new Blob([t],{type:'text/plain'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='tasks.txt';a.click();
};
function updList(){
    document.getElementById('cnt').textContent=`Tasks: ${tasks.length}`;
    if(!tasks.length){document.getElementById('lst').innerHTML='<span style=color:#888>Click to add</span>';return;}
    let h='';
    tasks.forEach((tk,i)=>{
        const pwy=(HPX-tk.py)*PS, dwy=(HPX-tk.dy)*PS;
        h+=`<span class="pu">T${i} P</span> px(${tk.px},${tk.py}) world(${(tk.px*PS).toFixed(0)},${pwy.toFixed(0)})m<br>`;
        h+=`<span class="de">   D</span> px(${tk.dx},${tk.dy}) world(${(tk.dx*PS).toFixed(0)},${dwy.toFixed(0)})m<br>`;
    });
    document.getElementById('lst').innerHTML=h;
}
function draw(){
    const s=c.width/WPX;
    ctx.clearRect(0,0,c.width,c.height);
    ctx.drawImage(bgImg,0,0,c.width,c.height);
    tasks.forEach((tk,i)=>{
        const p1=imgToCanvas(tk.px,tk.py),p2=imgToCanvas(tk.dx,tk.dy);
        ctx.strokeStyle='rgba(255,255,0,0.6)';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
        ctx.fillStyle='#0f0';ctx.beginPath();ctx.arc(p1.x,p1.y,6,0,7);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
        ctx.fillStyle='#f44';const sz=6;ctx.beginPath();
        ctx.moveTo(p2.x-sz,p2.y-sz);ctx.lineTo(p2.x+sz,p2.y+sz);
        ctx.moveTo(p2.x+sz,p2.y-sz);ctx.lineTo(p2.x-sz,p2.y+sz);
        ctx.lineWidth=2;ctx.strokeStyle='#fff';ctx.stroke();
    });
    if(cur){
        const p=imgToCanvas(cur.x,cur.y);
        ctx.fillStyle='#0f0';ctx.beginPath();ctx.arc(p.x,p.y,10,0,7);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();
    }
}
</script>
<div style="position:fixed;bottom:50px;left:8px;z-index:10">
<button class="btn-save" onclick="save()">Save tasks.txt</button>
<button class="btn-undo" onclick="undo()">Undo</button>
<button class="btn-clear" onclick="clearAll()">Clear</button>
</div>
